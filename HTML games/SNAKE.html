<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&display=swap">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #fff;
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px;
    overflow: hidden;
  }
  body.embedded {
    background: transparent;
    min-height: 0;
    height: 100%;
    padding: 0;
    justify-content: flex-start;
    display: flex;
    flex-direction: column;
  }
  h1 {
    font-size: clamp(1.2rem, 4vw, 2rem);
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    color: #00ff88;
    text-shadow: 0 0 10px #00ff88;
  }
  body.embedded h1 { display: none; }
  .info {
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    margin-bottom: 8px;
    color: #888;
    text-align: center;
  }
  body.embedded .info { display: none; }
  #gameContainer {
    position: relative;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 16 / 10;
  }
  body.embedded #gameContainer {
    max-width: none;
    width: 100%;
    height: 100%;
    flex: 1;
    min-height: 0;
    aspect-ratio: auto;
  }
  canvas {
    width: 100%;
    height: 100%;
    background: #000;
    border: 2px solid #00ff88;
    box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
    display: block;
  }
  body.embedded canvas {
    border: none;
    box-shadow: none;
    border-radius: 0.75rem;
  }
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    z-index: 5;
  }
  #overlay h2 {
    font-size: clamp(1.4rem, 5vw, 2.3rem);
    color: #00ff88;
    margin-bottom: 12px;
    text-shadow: 0 0 15px #00ff88;
  }
  #overlay p {
    font-size: clamp(0.8rem, 2.2vw, 1rem);
    margin-bottom: 18px;
    color: #ccc;
    line-height: 1.7;
  }
  body.embedded #overlay p {
    font-family: 'Andika', 'Comic Sans MS', system-ui, sans-serif;
    letter-spacing: 0.02em;
  }
  button {
    background: transparent;
    color: #00ff88;
    border: 2px solid #00ff88;
    padding: 12px 30px;
    font-family: inherit;
    font-size: clamp(0.9rem, 2.5vw, 1.1rem);
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.2s;
  }
  button:hover {
    background: #00ff88;
    color: #000;
    box-shadow: 0 0 20px #00ff88;
  }
  body.embedded button {
    font-family: 'Andika', 'Comic Sans MS', system-ui, sans-serif;
    letter-spacing: 0.08em;
    border-radius: 0.75rem;
    background: rgba(255, 255, 255, 0.08);
  }
  body.embedded button:hover { background: #00ff88; }
  .hidden { display: none !important; }
  .stats {
    margin-top: 8px;
    font-size: clamp(0.65rem, 1.8vw, 0.85rem);
    color: #888;
    text-align: center;
  }
  body.embedded .stats {
    margin-top: 6px;
    color: rgba(255, 255, 255, 0.65);
    font-family: 'Andika', 'Comic Sans MS', system-ui, sans-serif;
    letter-spacing: 0.02em;
  }
  body.embedded .stats { display: none; }
  .snake-touch-controls {
    position: absolute;
    right: 0.55rem;
    bottom: 0.55rem;
    z-index: 12;
    display: none;
    grid-template-columns: 3.1rem 3.1rem 3.1rem;
    grid-template-rows: 3.1rem 3.1rem 3.1rem;
    gap: 0.3rem;
    opacity: 0.92;
  }
  body.embedded .snake-touch-controls { display: grid; }
  .snake-touch-controls button {
    border: 2px solid rgba(0, 255, 136, 0.55);
    background: rgba(0, 0, 0, 0.55);
    color: #00ff88;
    border-radius: 0.65rem;
    font-size: 1.25rem;
    line-height: 1;
    cursor: pointer;
    touch-action: manipulation;
  }
  .snake-touch-controls button:active {
    background: rgba(0, 255, 136, 0.25);
  }
  #snakeUp { grid-column: 2; grid-row: 1; }
  #snakeLeft { grid-column: 1; grid-row: 2; }
  #snakeRight { grid-column: 3; grid-row: 2; }
  #snakeDown { grid-column: 2; grid-row: 3; }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div class="info">Arrow keys or WASD • Eat words to grow • Wrap around the edges</div>
  <div id="gameContainer">
    <canvas id="game"></canvas>
    <div id="touchControls" class="snake-touch-controls" aria-label="Snake direction pad">
      <button type="button" id="snakeUp" aria-label="Up">▲</button>
      <button type="button" id="snakeLeft" aria-label="Left">◀</button>
      <button type="button" id="snakeRight" aria-label="Right">▶</button>
      <button type="button" id="snakeDown" aria-label="Down">▼</button>
    </div>
    <div id="overlay">
      <h2 id="overlayTitle">READY?</h2>
      <p id="overlayText">Guide the snake to eat one word or sound at a time.<br>Each bite earns 100 points and makes you grow.<br>Don't bump into yourself!</p>
      <button id="startBtn">START GAME</button>
    </div>
  </div>
  <div class="stats">
    <span id="scoreDisplay">Score: 0</span> • <span id="lengthDisplay">Length: 3</span>
  </div>

<script>
(() => {
  const embedded = new URLSearchParams(window.location.search).get('embed') === '1';
  if (embedded) document.body.classList.add('embedded');

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayText = document.getElementById('overlayText');
  const startBtn = document.getElementById('startBtn');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const lengthDisplay = document.getElementById('lengthDisplay');

  const W = 800, H = 500;
  const COLS = 25, ROWS = 15;
  const CELL = W / COLS;
  const TICK_MS = 110;

  let focusWords = [];
  let wordDeck = [];
  let deckIdx = 0;
  let snake = [];
  let dir = { x: 1, y: 0 };
  let nextDir = { x: 1, y: 0 };
  let food = null;
  let score = 0;
  let running = false;
  let gameOver = false;
  let lastTick = 0;
  let audioCtx = null;

  function resize() {
    const rect = canvas.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr * (rect.width / W), 0, 0, dpr * (rect.height / H), 0, 0);
  }
  window.addEventListener('resize', resize);

  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function beep(freq, duration = 0.08, type = 'square', vol = 0.15) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
  }

  function focusItemLabel(word) {
    if (!word) return '';
    if (word.label) return String(word.label);
    const v = String(word.value || '');
    const sep = v.indexOf('\u0001');
    if (word.type === 'gpc' && sep >= 0) return v.slice(0, sep);
    return v;
  }

  function setFocusWords(words) {
    if (!Array.isArray(words)) return;
    focusWords = words.filter(w => w && w.value);
    wordDeck = shuffle([...focusWords]);
    deckIdx = 0;
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function nextFoodWord() {
    if (!wordDeck.length) {
      wordDeck = focusWords.length ? shuffle([...focusWords]) : [{ type: 'gpc', value: 'a' }];
      deckIdx = 0;
    }
    if (deckIdx >= wordDeck.length) {
      wordDeck = shuffle([...focusWords]);
      deckIdx = 0;
    }
    return wordDeck[deckIdx++];
  }

  function speakFocusWord(item) {
    if (!item) return;
    if (embedded && window.parent !== window) {
      try { window.parent.postMessage({ type: 'snake-speak', item }, '*'); } catch (e) {}
    }
  }

  if (embedded) {
    window.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'snake-focus-words') setFocusWords(e.data.words);
    });
    try { window.parent.postMessage({ type: 'snake-ready' }, '*'); } catch (e) {}
  }

  function resetSnake() {
    const startX = Math.floor(COLS / 2);
    const startY = Math.floor(ROWS / 2);
    snake = [
      { x: startX, y: startY },
      { x: startX - 1, y: startY },
      { x: startX - 2, y: startY }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
  }

  function foodCellSpan(label) {
    const len = String(label || '').length;
    return Math.max(1, Math.ceil(len / 3));
  }

  function occupiedCells() {
    const set = new Set(snake.map(s => `${s.x},${s.y}`));
    return set;
  }

  function spawnFood() {
    const word = nextFoodWord();
    const label = focusItemLabel(word);
    const span = foodCellSpan(label);
    const occupied = occupiedCells();
    let attempts = 0;
    let pos = null;
    while (attempts < 400) {
      const x = Math.floor(Math.random() * Math.max(1, COLS - span + 1));
      const y = Math.floor(Math.random() * ROWS);
      let ok = true;
      for (let dx = 0; dx < span; dx++) {
        if (occupied.has(`${x + dx},${y}`)) { ok = false; break; }
      }
      if (ok) { pos = { x, y, span, word, label }; break; }
      attempts++;
    }
    if (!pos) pos = { x: 0, y: 0, span, word, label };
    food = pos;
  }

  function resetGame() {
    score = 0;
    gameOver = false;
    resetSnake();
    spawnFood();
    updateStats();
  }

  function updateStats() {
    scoreDisplay.textContent = `Score: ${score}`;
    lengthDisplay.textContent = `Length: ${snake.length}`;
  }

  function setDirection(dx, dy) {
    if (!running || gameOver) return;
    if (dx === -dir.x && dy === -dir.y) return;
    if (dx !== 0 && dir.x !== 0) return;
    if (dy !== 0 && dir.y !== 0) return;
    nextDir = { x: dx, y: dy };
  }

  window.addEventListener('keydown', (e) => {
    const key = e.key.toLowerCase();
    if (key === 'arrowup' || key === 'w') { e.preventDefault(); setDirection(0, -1); }
    else if (key === 'arrowdown' || key === 's') { e.preventDefault(); setDirection(0, 1); }
    else if (key === 'arrowleft' || key === 'a') { e.preventDefault(); setDirection(-1, 0); }
    else if (key === 'arrowright' || key === 'd') { e.preventDefault(); setDirection(1, 0); }
  });

  let touchStart = null;
  const SWIPE_MIN = 28;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches[0]) touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });
  canvas.addEventListener('touchend', (e) => {
    if (!touchStart || !e.changedTouches[0]) return;
    const dx = e.changedTouches[0].clientX - touchStart.x;
    const dy = e.changedTouches[0].clientY - touchStart.y;
    if (Math.hypot(dx, dy) < SWIPE_MIN) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = null;
  }, { passive: true });

  const bindTouchBtn = (id, dx, dy) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    const go = (e) => { e.preventDefault(); setDirection(dx, dy); };
    btn.addEventListener('click', go);
    btn.addEventListener('touchstart', go, { passive: false });
  };
  bindTouchBtn('snakeUp', 0, -1);
  bindTouchBtn('snakeDown', 0, 1);
  bindTouchBtn('snakeLeft', -1, 0);
  bindTouchBtn('snakeRight', 1, 0);

  function wrapCoord(val, max) {
    if (val < 0) return max - 1;
    if (val >= max) return 0;
    return val;
  }

  function endGame() {
    gameOver = true;
    running = false;
    overlayTitle.textContent = 'GAME OVER';
    overlayTitle.style.color = '#ff4466';
    overlayTitle.style.textShadow = '0 0 15px #ff4466';
    overlayText.innerHTML = `Final score: <strong>${score}</strong><br>Length: ${snake.length}`;
    startBtn.textContent = 'PLAY AGAIN';
    overlay.classList.remove('hidden');
    beep(200, 0.3, 'sawtooth', 0.2);
    if (embedded && window.parent !== window) {
      try {
        window.parent.postMessage({ type: 'snake-game-over', score }, '*');
      } catch (e) {}
    }
  }

  function tick() {
    dir = nextDir;
    const head = snake[0];
    let nx = wrapCoord(head.x + dir.x, COLS);
    let ny = wrapCoord(head.y + dir.y, ROWS);

    const eating = food && ny === food.y && nx >= food.x && nx < food.x + food.span;
    const body = eating ? snake : snake.slice(0, -1);
    for (const seg of body) {
      if (seg.x === nx && seg.y === ny) {
        endGame();
        return;
      }
    }

    snake.unshift({ x: nx, y: ny });

    if (eating) {
      score += 100;
      speakFocusWord(food.word);
      beep(660, 0.1, 'triangle', 0.18);
      setTimeout(() => beep(880, 0.08, 'triangle', 0.15), 80);
      spawnFood();
    } else {
      snake.pop();
    }

    updateStats();
  }

  function draw() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = 'rgba(0, 255, 136, 0.08)';
    ctx.lineWidth = 1;
    for (let x = 0; x <= COLS; x++) {
      ctx.beginPath();
      ctx.moveTo(x * CELL, 0);
      ctx.lineTo(x * CELL, H);
      ctx.stroke();
    }
    for (let y = 0; y <= ROWS; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * CELL);
      ctx.lineTo(W, y * CELL);
      ctx.stroke();
    }

    if (food) {
      const fx = food.x * CELL;
      const fy = food.y * CELL;
      const fw = food.span * CELL;
      const label = food.label || focusItemLabel(food.word);
      const isHw = food.word?.type === 'hw';
      ctx.fillStyle = isHw ? '#f472b6' : '#67e8f9';
      ctx.shadowColor = ctx.fillStyle;
      ctx.shadowBlur = 12;
      ctx.fillRect(fx + 2, fy + 2, fw - 4, CELL - 4);
      ctx.shadowBlur = 0;
      ctx.fillStyle = isHw ? '#1a0a14' : '#042f2e';
      const fontSize = label.length <= 2 ? 18 : label.length <= 5 ? 14 : label.length <= 8 ? 12 : 10;
      ctx.font = `700 ${fontSize}px 'Sassoon Primary', 'SassoonPrimary', Andika, 'Comic Sans MS', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, fx + fw / 2, fy + CELL / 2 + 1);
      ctx.textBaseline = 'alphabetic';
    }

    snake.forEach((seg, i) => {
      const sx = seg.x * CELL;
      const sy = seg.y * CELL;
      const t = i / Math.max(1, snake.length - 1);
      const green = Math.round(0 + t * 180);
      ctx.fillStyle = i === 0 ? '#00ff88' : `rgb(0, ${180 - green * 0.3}, ${100 + green * 0.4})`;
      ctx.shadowColor = '#00ff88';
      ctx.shadowBlur = i === 0 ? 14 : 4;
      const pad = i === 0 ? 1 : 2;
      ctx.fillRect(sx + pad, sy + pad, CELL - pad * 2, CELL - pad * 2);
      ctx.shadowBlur = 0;
    });

    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText(`Score: ${score}`, 12, 26);
  }

  function loop(ts) {
    if (running && !gameOver) {
      if (ts - lastTick >= TICK_MS) {
        lastTick = ts;
        tick();
      }
    }
    draw();
    requestAnimationFrame(loop);
  }

  startBtn.addEventListener('click', () => {
    ensureAudio();
    if (gameOver) resetGame();
    overlay.classList.add('hidden');
    running = true;
    lastTick = performance.now();
  });

  resize();
  resetSnake();
  spawnFood();
  updateStats();
  running = false;
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
