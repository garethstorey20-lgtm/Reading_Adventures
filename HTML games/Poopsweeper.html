<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poop Dodger</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PoopDodger = () => {
          const GRID_SIZE = 8;
          const POOP_COUNT = 10;
          
          const [grid, setGrid] = useState([]);
          const [revealed, setRevealed] = useState([]);
          const [flagged, setFlagged] = useState([]);
          const [gameOver, setGameOver] = useState(false);
          const [won, setWon] = useState(false);
          const [initialized, setInitialized] = useState(false);
          const [hintIndex, setHintIndex] = useState(null);
          const [flagCount, setFlagCount] = useState(0);

          useEffect(() => {
            initializeGame();
          }, []);

          const initializeGame = () => {
            const newGrid = Array(GRID_SIZE * GRID_SIZE).fill(0);
            
            const poopPositions = new Set();
            while (poopPositions.size < POOP_COUNT) {
              poopPositions.add(Math.floor(Math.random() * (GRID_SIZE * GRID_SIZE)));
            }
            
            poopPositions.forEach(pos => {
              newGrid[pos] = 'P';
            });
            
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
              if (newGrid[i] === 'P') continue;
              
              let count = 0;
              const row = Math.floor(i / GRID_SIZE);
              const col = i % GRID_SIZE;
              
              for (let r = row - 1; r <= row + 1; r++) {
                for (let c = col - 1; c <= col + 1; c++) {
                  if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) {
                    const idx = r * GRID_SIZE + c;
                    if (newGrid[idx] === 'P') count++;
                  }
                }
              }
              
              newGrid[i] = count;
            }
            
            setGrid(newGrid);
            setRevealed(Array(GRID_SIZE * GRID_SIZE).fill(false));
            setFlagged(Array(GRID_SIZE * GRID_SIZE).fill(false));
            setGameOver(false);
            setWon(false);
            setFlagCount(0);
            setInitialized(true);

            findHintTile(newGrid);
          };

          const findHintTile = (currentGrid) => {
            const blankTiles = currentGrid
              .map((cell, idx) => cell === 0 ? idx : null)
              .filter(idx => idx !== null);
            
            if (blankTiles.length > 0) {
              const hintIdx = blankTiles[Math.floor(Math.random() * blankTiles.length)];
              setHintIndex(hintIdx);
            }
          };

          const handleTileClick = (index) => {
            if (gameOver || won || revealed[index]) return;

            if (index === hintIndex) {
              const newRevealed = Array(GRID_SIZE * GRID_SIZE).fill(false);
              floodFill(index, newRevealed, grid);
              setRevealed(newRevealed);
              setHintIndex(null);
              checkWin(newRevealed);
              return;
            }
            
            const newRevealed = [...revealed];
            
            if (grid[index] === 'P') {
              newRevealed[index] = true;
              setRevealed(newRevealed);
              setGameOver(true);
              return;
            }
            
            floodFill(index, newRevealed, grid);
            setRevealed(newRevealed);
            checkWin(newRevealed);
          };

          const handleRightClick = (index, e) => {
            e.preventDefault();
            if (gameOver || won || revealed[index]) return;

            const newFlagged = [...flagged];
            
            if (newFlagged[index]) {
              newFlagged[index] = false;
              setFlagged(newFlagged);
              setFlagCount(flagCount - 1);
            } 
            else if (flagCount < POOP_COUNT) {
              newFlagged[index] = true;
              setFlagged(newFlagged);
              
              if (grid[index] === 'P') {
                setFlagCount(flagCount + 1);
              }
            }
          };

          const floodFill = (index, newRevealed, currentGrid) => {
            if (newRevealed[index] || currentGrid[index] === 'P') return;
            
            newRevealed[index] = true;
            
            if (currentGrid[index] === 0) {
              const row = Math.floor(index / GRID_SIZE);
              const col = index % GRID_SIZE;
              
              for (let r = row - 1; r <= row + 1; r++) {
                for (let c = col - 1; c <= col + 1; c++) {
                  if (r >= 0 && r < GRID_SIZE && c >= 0 && c < GRID_SIZE) {
                    const newIndex = r * GRID_SIZE + c;
                    if (!newRevealed[newIndex]) {
                      floodFill(newIndex, newRevealed, currentGrid);
                    }
                  }
                }
              }
            }
          };

          const checkWin = (revealedState) => {
            let revealedCount = 0;
            for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
              if (revealedState[i] && grid[i] !== 'P') {
                revealedCount++;
              }
            }
            
            if (revealedCount === GRID_SIZE * GRID_SIZE - POOP_COUNT) {
              setWon(true);
            }
          };

          const getNumberColor = (num) => {
            const colors = {
              1: '#3B82F6',
              2: '#10B981',
              3: '#F59E0B',
              4: '#8B5CF6',
              5: '#EF4444',
              6: '#EC4899',
              7: '#06B6D4',
              8: '#F97316',
            };
            return colors[num] || '#000';
          };

          const Tile = ({ index }) => {
            const isRevealed = revealed[index];
            const isFlagged = flagged[index];
            const isHint = index === hintIndex;
            const content = grid[index];
            const isGameOverState = gameOver || won;
            
            return (
              <button
                onClick={() => handleTileClick(index)}
                onContextMenu={(e) => handleRightClick(index, e)}
                disabled={isGameOverState}
                className={`
                  relative w-full aspect-square rounded-lg font-bold text-2xl
                  transition-all duration-200 transform
                  ${isHint
                    ? 'bg-gradient-to-br from-[#FF8C42] to-[#FFB86D] shadow-md hover:shadow-lg hover:scale-105 cursor-pointer border-3 border-[#FF6B35]'
                    : !isRevealed 
                    ? 'bg-gradient-to-br from-[#87CEEB] to-[#4DA6D6] shadow-md hover:shadow-lg hover:scale-105 cursor-pointer border-2 border-[#2E8BC0]' 
                    : content === 'P' 
                    ? 'bg-gradient-to-br from-[#FF6B6B] to-[#FF8787] shadow-inner' 
                    : 'bg-gradient-to-br from-[#E8F5E9] to-[#C8E6C9] shadow-inner'
                  }
                  disabled:cursor-default
                  focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#4DA6D6]
                `}
              >
                {!isRevealed && isFlagged && (
                  <span className="text-3xl">🚧</span>
                )}
                {isHint && !isRevealed && !isFlagged && (
                  <span className="text-3xl animate-bounce">👉</span>
                )}
                {isRevealed && (
                  <>
                    {content === 'P' && (
                      <span className="text-4xl animate-pulse">💩</span>
                    )}
                    {content !== 'P' && content !== 0 && (
                      <span style={{ color: getNumberColor(content) }}>
                        {content}
                      </span>
                    )}
                  </>
                )}
              </button>
            );
          };

          if (!initialized) {
            return <div className="w-full h-screen bg-white" />;
          }

          return (
            <div className="w-full min-h-screen bg-gradient-to-br from-[#667EEA] via-[#764BA2] to-[#F093FB] flex items-center justify-center p-4">
              <div className="w-full max-w-2xl">
                <div className="mb-8 flex justify-between gap-4">
                  <div className="bg-white rounded-2xl px-6 py-4 shadow-lg">
                    <p className="text-sm text-gray-600 font-semibold">POOPS TO AVOID</p>
                    <p className="text-4xl font-bold text-[#FF6B6B]">{POOP_COUNT}</p>
                  </div>
                  <div className="bg-white rounded-2xl px-6 py-4 shadow-lg">
                    <p className="text-sm text-gray-600 font-semibold">POOPS FLAGGED</p>
                    <p className="text-4xl font-bold text-[#FF8C42]">{flagCount}</p>
                  </div>
                </div>

                <div className="mb-8 bg-white rounded-3xl p-8 shadow-2xl">
                  <div className="grid gap-2" style={{ gridTemplateColumns: `repeat(${GRID_SIZE}, 1fr)` }}>
                    {grid.map((_, index) => (
                      <Tile key={index} index={index} />
                    ))}
                  </div>
                </div>

                <div className="text-center text-white text-sm mb-4">
                  <p>Left Click to Reveal • Right Click to Flag</p>
                </div>

                {gameOver && (
                  <div className="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-12 text-center shadow-2xl animate-bounce">
                      <div className="text-6xl mb-4">💩</div>
                      <p className="text-3xl font-bold text-[#FF6B6B] mb-6">Oops!</p>
                      <p className="text-lg text-gray-600 mb-8">You found a poop!</p>
                      <button
                        onClick={initializeGame}
                        className="bg-gradient-to-r from-[#87CEEB] to-[#4DA6D6] hover:shadow-lg text-white font-bold py-4 px-8 rounded-2xl text-lg transition-all transform hover:scale-105"
                      >
                        Try Again
                      </button>
                    </div>
                  </div>
                )}

                {won && (
                  <div className="fixed inset-0 flex items-center justify-center bg-black/40 backdrop-blur-sm">
                    <div className="bg-white rounded-3xl p-12 text-center shadow-2xl animate-bounce">
                      <div className="text-6xl mb-4">🎉</div>
                      <p className="text-3xl font-bold text-[#10B981] mb-4">You Won!</p>
                      <p className="text-lg text-gray-600 mb-8">Amazing! You dodged all the poops!</p>
                      <button
                        onClick={initializeGame}
                        className="bg-gradient-to-r from-[#87CEEB] to-[#4DA6D6] hover:shadow-lg text-white font-bold py-4 px-8 rounded-2xl text-lg transition-all transform hover:scale-105"
                      >
                        Play Again
                      </button>
                    </div>
                  </div>
                )}

                <button
                  onClick={initializeGame}
                  className="fixed bottom-6 right-6 p-4 bg-white rounded-full shadow-lg hover:shadow-xl transition-all transform hover:scale-110"
                  title="New Game"
                >
                  ↻
                </button>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PoopDodger />);
    </script>
</body>
</html>
